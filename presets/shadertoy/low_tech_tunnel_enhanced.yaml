preset:
  name: "Low Tech Tunnel - Enhanced"
  author: "bug (Shadertoy) + JungleLabStudio"
  description: |
    Enhanced version with post-processing effects
    Adds bloom, color correction, and feedback for extra psychedelia

  nodes:
    # Original tunnel shader
    - id: tunnel_shader
      type: shadertoy
      params:
        shader_code: |
          #define V vec3
          #define P(z)     V( 12.* cos( (z)*vec2(.1,.12) ) , z)
          #define A(F,H,K) abs(dot( sin(F*p*K), H +p-p )) / K

          void mainImage(out vec4 o, vec2 u) {
              float t=iTime,s,i,d,e,
                    T = t*4. + 5. + 5.*sin(t*.3);
              V  c,r = iResolution;

              u = ( u - r.xy/2. ) / r.y;
              if (abs(u.y) < .37)

              for (V p = P(T),
                        Z = normalize( P(T+4.) - p),
                        X = normalize(V(Z.z,0,-Z)),
                        D = V(u, 1) * mat3(-X, cross(X, Z), Z);

                  i++ < 28.;

                  c += 1./s + V(10,20,50)/max(e, .6)
              )
                  p += D * s,
                  X = P(p.z),
                  t = sin(t),
                  e = length(p - V(
                             X.x,
                             X.y + t,
                             6.+T + t)-t)-.01,
                  s = cos(p.z*.6)*2.+ 4.
                    - min( length(p.xy - X.x - 6.)
                         , length((p-X).xy) )
                    + A(  4., .25, .1)
                    + A(T+8., .22, 2.),
                  d += s = min(e,.01+.3*abs(s));

              o.rgb = c*c/1e6;
          }

    # Add bloom glow effect
    - id: bloom
      type: effect.bloom
      inputs:
        source: tunnel_shader
      params:
        intensity: 0.6
        threshold: 0.3
        radius: 2.0

    # Add subtle chromatic aberration
    - id: chromatic
      type: effect.chromatic_aberration
      inputs:
        source: bloom
      params:
        amount: 0.003
        direction: 0.0

    # Color grading
    - id: color
      type: effect.color
      inputs:
        source: chromatic
      params:
        brightness: 1.1
        contrast: 1.2
        saturation: 1.3
        hue_shift: 0.0

    # Optional: Add feedback for trails
    - id: feedback
      type: effect.feedback
      inputs:
        source: color
      params:
        amount: 0.15
        decay: 0.95
        scale: 1.01

    - id: output
      type: output
      inputs:
        source: feedback
