preset:
  name: "Tunnel Effect - Native Recreation"
  author: "JungleLabStudio"
  description: |
    Recreation of tunnel effect using only native generator nodes
    Demonstrates how to build Shadertoy-style effects without code

    Combines:
    - Plasma generator for tunnel base
    - Pattern generator for geometric details
    - Metaballs for the moving orb
    - Blend modes to composite

  nodes:
    # Base tunnel using plasma in tunnel mode
    - id: tunnel_base
      type: generator.plasma
      params:
        effect_type: 1  # Tunnel mode
        frequency: 6.0
        speed: 1.6
        distortion: 1.5
        color_speed: 0.5
        color_offset: 0.0
        brightness: 0.8
        contrast: 1.4

    # Add procedural detail texture using domain warp
    - id: detail_texture
      type: generator.domain_warp
      params:
        scale: 8.0
        warp_amount: 2.0
        octaves: 4
        lacunarity: 2.0
        persistence: 0.5
        warp_octaves: 2
        color_a: [0.0, 0.0, 0.0]
        color_b: [0.3, 0.3, 0.3]

    # Blend detail texture onto tunnel
    - id: tunnel_detailed
      type: effect.blend
      mode: add
      inputs:
        a: tunnel_base
        b: detail_texture
      params:
        opacity: 0.4

    # Create moving orb using metaballs
    - id: orb
      type: generator.metaballs
      params:
        num_balls: 1
        threshold: 1.2
        ball_size: 0.5
        animation_speed: 1.0
        animation_chaos: 0.3
        color_a: [0.1, 0.2, 0.5]
        color_b: [1.0, 2.0, 5.0]
        glow: 2.0
        smoothness: 0.2

    # Composite orb over tunnel
    - id: composite
      type: effect.blend
      mode: screen
      inputs:
        a: tunnel_detailed
        b: orb
      params:
        opacity: 0.8

    # Add glow
    - id: bloom
      type: effect.bloom
      inputs:
        source: composite
      params:
        intensity: 0.8
        threshold: 0.2
        radius: 2.5

    # Final color adjustment
    - id: final_color
      type: effect.color
      inputs:
        source: bloom
      params:
        brightness: 1.2
        contrast: 1.3
        saturation: 1.4
        hue_shift: 0.0

    - id: output
      type: output
      inputs:
        source: final_color

  # MIDI mappings for live control
  midi_mappings:
    tunnel_base.speed:
      cc: 1
      channel: 0
      min: 0.0
      max: 3.0

    tunnel_base.frequency:
      cc: 2
      channel: 0
      min: 2.0
      max: 12.0

    orb.glow:
      cc: 3
      channel: 0
      min: 0.0
      max: 3.0

    bloom.intensity:
      cc: 4
      channel: 0
      min: 0.0
      max: 2.0

    final_color.hue_shift:
      cc: 5
      channel: 0
      min: 0.0
      max: 6.28
