preset:
  name: "Liquid Blobs"
  author: "JungleLabStudio"
  description: "Organic blob effect using metaballs"

  nodes:
    - id: metaballs
      type: generator.metaballs
      params:
        num_balls: 6
        threshold: 1.0
        ball_size: 0.35
        animation_speed: 1.0
        animation_chaos: 1.2
        color_a: [0.1, 0.2, 0.6]
        color_b: [0.9, 0.3, 0.8]
        glow: 0.8
        smoothness: 0.15

    - id: output
      type: output
      inputs:
        source: metaballs
