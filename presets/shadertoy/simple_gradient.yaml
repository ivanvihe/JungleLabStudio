preset:
  name: "Shadertoy - Simple Gradient"
  description: "Basic Shadertoy test - animated gradient"
  author: "JungleLabStudio"
  version: "1.0.0"
  source: "shadertoy"
  tags: ["shadertoy", "test", "simple"]

  settings:
    bpm: 120.0
    audio_reactive: false
    midi_enabled: false

  nodes:
    - id: shadertoy_gradient
      type: shadertoy
      position: [100, 100]
      params:
        shadertoy_code: |
          void mainImage(out vec4 fragColor, in vec2 fragCoord) {
              // Normalize pixel coordinates (0-1)
              vec2 uv = fragCoord / iResolution.xy;

              // Create animated gradient
              vec3 col = vec3(
                  uv.x,                           // Red increases left to right
                  uv.y,                           // Green increases bottom to top
                  0.5 + 0.5 * sin(iTime)         // Blue oscillates with time
              );

              // Output final color
              fragColor = vec4(col, 1.0);
          }

    - id: output
      type: output
      position: [300, 100]
      inputs:
        input0: shadertoy_gradient
