preset:
  name: "Marble Sphere"
  author: "JungleLabStudio"
  description: "3D raymarched sphere with marble domain warp texture"

  nodes:
    # Create marble texture using domain warp
    - id: marble_texture
      type: generator.domain_warp
      params:
        scale: 4.0
        warp_amount: 1.5
        octaves: 5
        lacunarity: 2.0
        persistence: 0.5
        warp_octaves: 3
        color_a: [0.1, 0.05, 0.02]
        color_b: [0.9, 0.85, 0.8]

    # 3D sphere
    - id: sphere
      type: generator.raymarching
      params:
        primitive: 0  # Sphere
        camera_distance: 3.0
        camera_rotate: 1.0
        light_dir_x: 1.0
        light_dir_y: 1.0
        light_dir_z: 1.0
        material_color: [0.8, 0.7, 0.6]
        ambient: 0.2
        diffuse: 0.8
        specular: 0.6
        shininess: 48.0
        max_steps: 100
        max_dist: 20.0

    # Blend marble texture with sphere (multiply blend)
    - id: blend
      type: effect.blend
      mode: multiply
      inputs:
        a: sphere
        b: marble_texture
      params:
        opacity: 0.8

    - id: output
      type: output
      inputs:
        source: blend
