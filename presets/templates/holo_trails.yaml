# ==============================================================================
# HOLO TRAILS
# Holographic field with trailing effects
# Converted from legacy .preset format to YAML DSL
# ==============================================================================

preset:
  name: "Holo Trails"
  description: "Holographic field patterns with audio-reactive flux"
  resolution: [1920, 1080]
  framerate: 60

  nodes:
    # --- GENERATOR: Holographic field ---
    - id: holo_gen
      type: shader
      params:
        shader_path: src/shaders/holo_field.glsl
        speed: 0.4
        flux: 0.4
        intensity: 1.0
        color_primary: [0.0, 1.0, 0.8]
        color_secondary: [0.8, 0.0, 1.0]
        trail_length: 0.8

        # Animate flux for wave-like motion
        animate:
          flux:
            lfo:
              type: sine
              freq: 0.12
              amp: 0.2

    # --- OUTPUT ---
    - id: output
      type: output
      inputs: ["holo_gen"]

  # --- MIDI MAPPINGS ---
  midi:
    mappings:
      # CC14: Flux intensity
      - target: "nodes.holo_gen.params.flux"
        trigger: "CC14"
        range: [0.2, 1.0]

      # CC15: Trail length
      - target: "nodes.holo_gen.params.trail_length"
        trigger: "CC15"
        range: [0.3, 1.0]

      # CC16: Speed
      - target: "nodes.holo_gen.params.speed"
        trigger: "CC16"
        range: [0.1, 1.0]

      # CC17: Intensity
      - target: "nodes.holo_gen.params.intensity"
        trigger: "CC17"
        range: [0.5, 2.0]

      # Note 60: Trail burst
      - target: "nodes.holo_gen.params.trail_length"
        trigger: "NOTE_60"

      # Note 62: Jump object (flux spike)
      - target: "nodes.holo_gen.params.flux"
        trigger: "NOTE_62"

# ==============================================================================
# NOTES:
# - Uses holo_field.glsl shader
# - Audio reactivity via flux parameter
# - MIDI triggers for dynamic control
# - Suitable for glitch/IDM aesthetics
# ==============================================================================
