# ==============================================================================
# IVAN SIMPLE - Audio Reactive Circle (Simplified)
# Círculo que hace bounce con bajos - versión mínima sin dependencias
# ==============================================================================

preset:
  name: "Ivan Simple"
  description: "Círculo blanco que hace bounce con bajos"
  resolution: [1920, 1080]
  framerate: 60

  nodes:
    # --- GENERATOR: Circle shader ---
    - id: circle
      type: shader
      params:
        shader_path: src/shaders/audio_circle.glsl
        speed: 0.0
        radius: 0.15
        position: [0.5, 0.5]
        color: [1.0, 1.0, 1.0]
        glow: 0.5
        bounce_scale: 1.0

        # Audio-reactive bounce
        animate:
          bounce_scale:
            audio:
              band: 0
              min_value: 1.0
              max_value: 2.5
              smoothing: 0.3

    # --- OUTPUT ---
    - id: out
      type: output
      inputs: ["circle"]
