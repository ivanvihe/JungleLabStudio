name: "Particle Flow"
description: "Particle system flowing through a vector field"
author: "YAML DSL"
version: "1.0"
tags: ["particles", "flow", "audio-reactive"]

controls:
  particle_count:
    type: slider
    label: "Particle Count"
    min: 100
    max: 5000
    default: 2000
    step: 100
  particle_size:
    type: slider
    label: "Particle Size"
    min: 1.0
    max: 10.0
    default: 3.0
    step: 0.5
  flow_intensity:
    type: slider
    label: "Flow Intensity"
    min: 0.0
    max: 2.0
    default: 1.0
    step: 0.1

nodes:
  # Generate noise field for flow
  flow_field:
    type: noise_field
    resolution: 32
    scale: 2.0
    octaves: 4

  # Generate particles
  particles:
    type: particles
    count: 2000
    size: 3.0
    spread: 2.0
    audio_reactive: true
    audio_band: mid
    audio_intensity: 0.5

  # Apply displacement based on flow field
  displace_particles:
    type: displace
    amount: 0.2
    frequency: 1.0
    audio_reactive: true
    audio_band: bass
    inputs:
      input: particles
      field: flow_field

  # Add color gradient
  colorize:
    type: color
    color: [1.0, 0.5, 0.2, 0.8]
    hue_shift: 0.0
    audio_reactive: true
    audio_band: high
    audio_intensity: 1.0
    inputs:
      input: displace_particles

  # Add glow
  glow_particles:
    type: glow
    intensity: 2.0
    radius: 0.2
    audio_reactive: true
    audio_band: high
    inputs:
      input: colorize

  # Add trail effect
  motion_trail:
    type: trail
    length: 15
    fade: 0.92
    inputs:
      input: glow_particles
